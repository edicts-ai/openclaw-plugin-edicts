name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build edicts tarball
        run: |
          git clone --depth 1 https://github.com/edicts-ai/edicts.git /tmp/edicts
          cd /tmp/edicts && npm install && npm run build && npm pack --pack-destination $GITHUB_WORKSPACE
          ls -la $GITHUB_WORKSPACE/edicts-*.tgz

      - name: Install plugin with packed edicts
        run: |
          npm install ./edicts-*.tgz
          npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Publish disabled — currently publishing manually.
      # Uncomment and add NPM_TOKEN secret to enable automated publishing.
