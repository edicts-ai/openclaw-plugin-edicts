name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Checkout and build edicts
        uses: actions/checkout@v4
        with:
          repository: mssteuer/edicts
          path: _edicts

      - name: Pack edicts as tarball
        run: |
          cd _edicts && npm install && npm run build && npm pack --pack-destination ..
          ls -la ../edicts-*.tgz

      - name: Install plugin with packed edicts
        run: |
          npm pkg set "dependencies.edicts=$(echo edicts-*.tgz)"
          npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Set published dependency version
        run: npm pkg set dependencies.edicts=">=0.1.0"

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
