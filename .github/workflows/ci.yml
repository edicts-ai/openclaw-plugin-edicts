name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout edicts dependency
        uses: actions/checkout@v4
        with:
          repository: mssteuer/edicts
          path: edicts

      - name: Build edicts
        run: cd edicts && npm install && npm run build

      - name: Install plugin (uses file:./edicts)
        run: |
          npm pkg set dependencies.edicts="file:./edicts"
          npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
