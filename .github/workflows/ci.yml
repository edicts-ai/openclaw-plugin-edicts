name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build edicts tarball
        run: |
          git clone --depth 1 https://github.com/mssteuer/edicts.git /tmp/edicts
          cd /tmp/edicts && npm install && npm run build && npm pack --pack-destination $GITHUB_WORKSPACE
          ls -la $GITHUB_WORKSPACE/edicts-*.tgz

      - name: Install plugin with packed edicts
        run: |
          npm install ./edicts-*.tgz
          npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
