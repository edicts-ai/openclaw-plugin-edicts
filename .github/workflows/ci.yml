name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout and build edicts
        uses: actions/checkout@v4
        with:
          repository: mssteuer/edicts
          path: _edicts

      - name: Pack edicts as tarball
        run: |
          cd _edicts && npm install && npm run build && npm pack --pack-destination ..
          ls -la ../edicts-*.tgz

      - name: Install plugin with packed edicts
        run: |
          npm pkg set "dependencies.edicts=$(echo edicts-*.tgz)"
          npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
